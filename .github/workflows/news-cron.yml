name: news-cron
on:
  schedule:
    - cron: "7 3 * * *"
    - cron: "7 9 * * *"
    - cron: "7 15 * * *"
  workflow_dispatch: {}
jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx tsx scripts/draft-once.ts
        env:
          SITE_URL: https://news.investwithraj.com
          POST_PUBLISH_SECRET: ${{ secrets.POST_PUBLISH_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
