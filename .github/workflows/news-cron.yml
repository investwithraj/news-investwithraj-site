name: news-cron
on:
  schedule:
    - cron: "7 3 * * *"
    - cron: "7 9 * * *"
    - cron: "7 15 * * *"
  workflow_dispatch: {}
jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger draft
        run: |
          curl -sS -X POST \
            "https://news.investwithraj.com/api/cron/draft?secret=${{ secrets.POST_PUBLISH_SECRET }}" \
            -H "content-type: application/json" --max-time 120
            
