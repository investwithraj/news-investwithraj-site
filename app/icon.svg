<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- v13 SOTY favicon — RT italic monogram on warm cream, brass color.
       Cucinelli register, replaces the v10 gold-orb on navy. -->
  <rect width="64" height="64" rx="10" ry="10" fill="#F5F1ED"/>
  <!-- Brass corner hairlines (top-right) -->
  <line x1="50" y1="10" x2="58" y2="10" stroke="#C9A961" stroke-width="1" stroke-linecap="round"/>
  <line x1="54" y1="14" x2="58" y2="14" stroke="#C9A961" stroke-width="1" stroke-linecap="round"/>
  <!-- RT italic monogram in brass -->
  <text
    x="32"
    y="46"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-style="italic"
    font-weight="500"
    font-size="40"
    letter-spacing="-3"
    fill="#A8854B"
  >RT</text>
</svg>
